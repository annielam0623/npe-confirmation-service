<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPE Operations — Sign in</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f3;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #1a1a1a;
  }
  .card {
    background: #fff;
    border: 0.5px solid rgba(0,0,0,0.12);
    border-radius: 12px;
    padding: 40px 44px;
    width: 360px;
  }
  .brand { text-align: center; margin-bottom: 32px; }
  .brand-name { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
  .brand-sub { font-size: 12px; color: #888; }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 12px;
    color: #555;
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    padding: 9px 12px;
    border: 0.5px solid rgba(0,0,0,0.18);
    border-radius: 8px;
    font-size: 13px;
    color: #1a1a1a;
    background: #fff;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus { border-color: rgba(0,0,0,0.4); }
  .error {
    background: #fff5f5;
    border: 0.5px solid #fca5a5;
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 12px;
    color: #b91c1c;
    margin-bottom: 16px;
  }
  .btn-login {
    width: 100%;
    padding: 10px;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity 0.15s;
  }
  .btn-login:hover { opacity: 0.85; }
  .footer {
    text-align: center;
    margin-top: 24px;
    font-size: 11px;
    color: #bbb;
  }
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-name">NPE Operations</div>
    <div class="brand-sub">confirm.nationalparkexpress.com</div>
  </div>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="post" action="/auth/login">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username"
             placeholder="e.g. annie" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login">Sign in</button>
  </form>

  <div class="footer">National Park Express · Internal use only</div>
</div>
</body>
</html>
