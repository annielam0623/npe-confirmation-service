<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morning Pickup Tracking — NPE</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d1b2e;
      color: #e0eaf6;
      min-height: 100vh;
    }

    .topbar {
      background: #0a1628;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .topbar-title {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
    }

    .back-btn {
      font-size: 12px;
      color: #7a9bbe;
      text-decoration: none;
      padding: 4px 10px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
    }

    .back-btn:hover {
      color: #fff;
      border-color: rgba(255, 255, 255, 0.3);
    }

    .container {
      width: 100%;
      padding: 20px 24px;
    }

    .date-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
    }

    .btn-nav {
      width: 32px;
      height: 32px;
      border-radius: 7px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: #1a2f4a;
      cursor: pointer;
      font-size: 16px;
      color: #a0c0e0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-nav:hover {
      background: #1e3a5f;
      color: #fff;
    }

    .date-display {
      background: #1a2f4a;
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 6px 10px;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      min-width: 140px;
      text-align: center;
      color: #fff;
      cursor: pointer;
      outline: none;
      font-family: inherit;
      color-scheme: dark;
    }

    .date-display:focus {
      border-color: #185FA5;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: 7px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      font-size: 12px;
      cursor: pointer;
      background: #1a2f4a;
      color: #a0c0e0;
      text-decoration: none;
      transition: background 0.1s;
    }

    .btn:hover {
      background: #1e3a5f;
      color: #fff;
    }

    .btn-today {
      background: #c47a12;
      border-color: #c47a12;
      color: #fff;
      font-weight: 600;
    }

    .btn-today:hover {
      background: #a86510;
    }

    .btn-refresh {
      background: #1a6b3a;
      border-color: #1a6b3a;
      color: #fff;
    }

    .btn-refresh:hover {
      background: #145530;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 18px;
    }

    .pill {
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: #1a2f4a;
      color: #7a9bbe;
      white-space: nowrap;
    }

    .pill:hover {
      border-color: rgba(255, 255, 255, 0.3);
      color: #fff;
    }

    .pill.active {
      background: #185FA5;
      border-color: #185FA5;
      color: #fff;
    }

    .stats-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: #1a2f4a;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 12px 20px;
      text-align: center;
      min-width: 100px;
    }

    .stat-card .num {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
    }

    .stat-card .lbl {
      font-size: 11px;
      color: #7a9bbe;
      margin-top: 2px;
    }

    .stat-card.checked-in .num {
      color: #2ecc71;
    }

    .stat-card.pending-in .num {
      color: #e67e22;
    }

    .filter-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }

    .filter-bar input {
      padding: 7px 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 7px;
      font-size: 13px;
      background: #1a2f4a;
      color: #e0eaf6;
      width: 220px;
    }

    .filter-bar input:focus {
      outline: none;
      border-color: #185FA5;
    }

    .records-count {
      font-size: 12px;
      color: #5a7a9a;
      margin-left: auto;
    }

    /* Table */
    .table-card {
      background: #1a2f4a;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      overflow: hidden;
    }

    .table-header {
      padding: 12px 16px;
      background: #0f2035;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .table-header span {
      font-size: 13px;
      font-weight: 600;
      color: #7ab3e0;
    }

    .table-scroll {
      overflow-x: auto;
    }

    table.track-tbl {
      width: max-content;
      min-width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      table-layout: auto;
    }

    .track-tbl thead td {
      padding: 9px 12px;
      font-size: 11px;
      font-weight: 700;
      color: #7a9bbe;
      background: #0f2035;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      position: relative;
      user-select: none;
      cursor: grab;
    }

    .track-tbl thead td.dragging {
      opacity: 0.4;
      background: #0a1e35;
    }

    .track-tbl thead td.drag-over {
      border-left: 2px solid #5ba3d9;
    }

    .track-tbl tbody tr {
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .track-tbl tbody tr:last-child {
      border-bottom: none;
    }

    .track-tbl tbody tr:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    .track-tbl tbody td {
      padding: 10px 12px;
      color: #c8ddf0;
      vertical-align: middle;
      white-space: nowrap;
    }

    /* Col resizer handle */
    .col-resizer {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 5px;
      cursor: col-resize;
      z-index: 2;
      background: transparent;
    }

    .col-resizer:hover,
    .col-resizer.resizing {
      background: rgba(100, 160, 220, 0.4);
    }

    .sp {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }

    .sp-checkedin {
      background: rgba(46, 204, 113, 0.15);
      color: #2ecc71;
    }

    .sp-pending {
      background: rgba(230, 126, 34, 0.15);
      color: #e67e22;
    }

    .sp-delivered {
      background: rgba(52, 152, 219, 0.15);
      color: #3498db;
    }

    .sp-sent {
      background: rgba(155, 89, 182, 0.15);
      color: #9b59b6;
    }

    .sp-undelivered {
      background: rgba(231, 76, 60, 0.15);
      color: #e74c3c;
    }

    .sp-failed {
      background: rgba(231, 76, 60, 0.15);
      color: #e74c3c;
    }

    /* Plain text SMS status — no background pill */
    .sp-plain { font-size: 11px; font-weight: 600; }
    .sp-plain.sp-delivered  { color: #2F7851; }
    .sp-plain.sp-sent       { color: #2F7851; }
    .sp-plain.sp-undelivered{ color: #e74c3c; }
    .sp-plain.sp-failed     { color: #e74c3c; }
    .sp-plain.sp-pending    { color: #aaa; }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="topbar-left">
      <a href="/admin/dashboard" class="back-btn">← Back</a>
      <span class="topbar-title">🔵 Morning Pickup Tracking</span>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn" onclick="exportExcel()">⬇ Export</button>
      <button class="btn btn-refresh" onclick="loadData()">↻ Refresh</button>
    </div>
  </div>

  <div class="container">
    <div class="date-nav">
      <button class="btn-nav" onclick="changeDate(-1)">‹</button>
      <input type="date" class="date-display" id="date-display" onchange="onDatePick(this.value)"
        onclick="try{this.showPicker()}catch(e){}">
      <button class="btn-nav" onclick="changeDate(1)">›</button>
      <button class="btn btn-today" onclick="goToday()">Today</button>
    </div>

    <div class="pills" id="pills-container">
      <span class="pill active" data-driver="all" onclick="filterDriver('all',this)">All</span>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="num" id="stat-total">—</div>
        <div class="lbl">Total</div>
      </div>
      <div class="stat-card checked-in">
        <div class="num" id="stat-checkedin">—</div>
        <div class="lbl">Checked In</div>
      </div>
      <div class="stat-card pending-in">
        <div class="num" id="stat-pending">—</div>
        <div class="lbl">Pending</div>
      </div>
    </div>

    <div class="filter-bar">
      <input type="text" id="search-input" placeholder="Search order #, name, phone…" oninput="applyFilter()">
      <span class="records-count" id="records-count">— records</span>
    </div>

    <div class="table-card">
      <div class="table-header">
        <span>Check-in Log</span>
        <span style="font-size:12px;color:#5a7a9a;" id="table-meta"></span>
      </div>
      <div class="table-scroll">
        <div style="text-align:right;font-size:11px;color:#aaa;margin-bottom:4px;padding:0 2px;">&#8646; Drag columns to reorder &nbsp;·&nbsp; &#8596; Drag edges to resize</div>
<table class="track-tbl">
          <thead>
            <tr id="thead-row"></tr>
          </thead>
          <tbody id="track-tbody">
            <tr>
              <td colspan="12" style="padding:28px;text-align:center;color:#4a6a8a;">Loading…</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // ── Column definitions (order = display order, key = data field) ──
    const COL_DEFS = [
      { key: 'order_number', label: 'Order #' },
      { key: 'name', label: 'Name' },
      { key: 'phone', label: 'Phone' },
      { key: 'quantities', label: 'PAX' },
      { key: 'vehicle_no', label: 'Bus #' },
      { key: 'driver', label: 'Driver' },
      { key: 'pickup_time', label: 'Pickup Time' },
      { key: 'pickup_location', label: 'Pickup Location' },
      { key: 'sms_status', label: 'SMS Status' },
      { key: 'email_status', label: 'Email Status' },
      { key: 'agent_name', label: 'Agent' },
      { key: 'checkin_status', label: 'Check-in' },
      { key: 'submitted_at', label: 'Check-in Time' },
    ];

    const STORAGE_KEY = 'npe_morning_col_order';
    let colOrder = loadColOrder();

    function loadColOrder() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const keys = JSON.parse(saved);
          // Validate: must contain all keys
          if (keys.length === COL_DEFS.length && COL_DEFS.every(c => keys.includes(c.key))) return keys;
        }
      } catch (e) { }
      return COL_DEFS.map(c => c.key);
    }

    function saveColOrder() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(colOrder));
    }

    function getOrderedCols() {
      return colOrder.map(k => COL_DEFS.find(c => c.key === k)).filter(Boolean);
    }

    // ── Build thead ──
    function buildThead() {
      const tr = document.getElementById('thead-row');
      tr.innerHTML = '';
      getOrderedCols().forEach(col => {
        const td = document.createElement('td');
        td.dataset.key = col.key;
        td.innerHTML = '<span style="color:#bbb;font-size:10px;margin-right:4px;letter-spacing:1px;user-select:none;">⠿</span>' + col.label + '<div class="col-resizer"></div>';
        td.draggable = true;
        tr.appendChild(td);
      });
      initColDrag();
      initColResize();
    }

    // ── Cell renderer ──
    function renderCell(r, key) {
      switch (key) {
        case 'order_number':
          return `<td style="color:#5ba3d9;font-weight:600;">${r.order_number || '—'}</td>`;
        case 'name':
          return `<td>${r.name || '—'}</td>`;
        case 'phone':
          return `<td style="font-size:12px;color:#a0c0e0;">${r.phone || '—'}</td>`;
        case 'quantities':
          return `<td style="text-align:center;font-weight:600;">${r.quantities || '—'}</td>`;
        case 'vehicle_no':
          return `<td style="font-weight:600;">${r.vehicle_no || '—'}</td>`;
        case 'driver':
          return `<td>${r.driver || '—'}</td>`;
        case 'pickup_time':
          return `<td style="font-weight:600;">${r.pickup_time || '—'}</td>`;
        case 'pickup_location':
          return `<td style="font-size:12px;">${r.pickup_location || '—'}</td>`;
        case 'sms_status': {
          const cls = smsStatusClass(r.sms_status);
          return `<td><span class="sp-plain ${cls}">${smsLabel(r.sms_status)}</span></td>`;
        }
        case 'email_status': {
          const cls = emailStatusClass(r.email_status);
          return `<td><span class="sp ${cls}">${emailLabel(r.email_status)}</span></td>`;
        }
        case 'agent_name':
          return `<td style="font-size:12px;color:#a0c0e0;">${r.agent_name || '—'}</td>`;
        case 'checkin_status': {
          const cls = r.checkin_status === 'checked_in' ? 'sp-checkedin' : 'sp-pending';
          return `<td><span class="sp ${cls}">${r.checkin_status === 'checked_in' ? '✓ Checked In' : '⏳ Pending'}</span></td>`;
        }
        case 'submitted_at': {
          const val = r.submitted_at ? new Date(r.submitted_at).toLocaleString('en-US', { timeZone: 'America/Los_Angeles', month: 'numeric', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '—';
          return `<td style="font-size:11px;color:#7a9bbe;">${val}</td>`;
        }
        default: return `<td>—</td>`;
      }
    }

    // ── Column drag to reorder ──
    let dragSrcKey = null;

    function initColDrag() {
      const tds = document.querySelectorAll('#thead-row td');
      tds.forEach(td => {
        td.addEventListener('dragstart', e => {
          dragSrcKey = td.dataset.key;
          td.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });
        td.addEventListener('dragend', () => {
          td.classList.remove('dragging');
          document.querySelectorAll('#thead-row td').forEach(t => t.classList.remove('drag-over'));
        });
        td.addEventListener('dragover', e => {
          e.preventDefault();
          if (td.dataset.key !== dragSrcKey) td.classList.add('drag-over');
        });
        td.addEventListener('dragleave', () => td.classList.remove('drag-over'));
        td.addEventListener('drop', e => {
          e.preventDefault();
          td.classList.remove('drag-over');
          if (!dragSrcKey || dragSrcKey === td.dataset.key) return;
          // Reorder colOrder
          const fromIdx = colOrder.indexOf(dragSrcKey);
          const toIdx = colOrder.indexOf(td.dataset.key);
          colOrder.splice(fromIdx, 1);
          colOrder.splice(toIdx, 0, dragSrcKey);
          saveColOrder();
          buildThead();
          applyFilter(); // re-render rows in new order
        });
      });
    }

    // ── Column resize ──
    function initColResize() {
      document.querySelectorAll('#thead-row td').forEach(th => {
        const resizer = th.querySelector('.col-resizer');
        if (!resizer) return;
        let startX, startW;
        resizer.addEventListener('mousedown', e => {
          e.stopPropagation(); // don't trigger drag
          startX = e.clientX;
          startW = th.offsetWidth;
          resizer.classList.add('resizing');
          document.body.style.cursor = 'col-resize';
          document.body.style.userSelect = 'none';
          const onMove = e => { th.style.width = Math.max(40, startW + e.clientX - startX) + 'px'; };
          const onUp = () => {
            resizer.classList.remove('resizing');
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
          };
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
          e.preventDefault();
        });
      });
    }

    // ── Data ──
    const params = new URLSearchParams(location.search);
    let currentDate = params.get('date') || new Date().toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' });
    let currentDriver = 'all';
    let allRows = [];

    function onDatePick(val) { currentDate = val; loadData(); }
    function changeDate(d) {
      const dt = new Date(currentDate + 'T00:00:00');
      dt.setDate(dt.getDate() + d);
      currentDate = dt.toISOString().split('T')[0];
      document.getElementById('date-display').value = currentDate;
      loadData();
    }
    function goToday() {
      currentDate = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' });
      document.getElementById('date-display').value = currentDate;
      loadData();
    }
    function filterDriver(driver, el) {
      currentDriver = driver;
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      applyFilter();
    }

    async function loadData() {
      const cols = getOrderedCols().length;
      document.getElementById('track-tbody').innerHTML =
        `<tr><td colspan="${cols}" style="padding:28px;text-align:center;color:#4a6a8a;">Loading…</td></tr>`;
      try {
        const res = await fetch(`/api/notifications/morning-pickup/tracking?date=${currentDate}`);
        const data = await res.json();
        allRows = data.rows || [];
        buildDriverPills();
        applyFilter();
      } catch (e) {
        document.getElementById('track-tbody').innerHTML =
          `<tr><td colspan="${cols}" style="padding:28px;text-align:center;color:#4a6a8a;">Failed to load.</td></tr>`;
      }
    }

    function buildDriverPills() {
      const drivers = [...new Set(allRows.map(r => r.driver).filter(Boolean))];
      const container = document.getElementById('pills-container');
      const allPill = `<span class="pill active" data-driver="all" onclick="filterDriver('all',this)">All <span style="opacity:.7;font-size:11px;">${allRows.length}</span></span>`;
      const driverPills = drivers.map(d => {
        const cnt = allRows.filter(r => r.driver === d).length;
        const ci = allRows.filter(r => r.driver === d && r.checkin_status === 'checked_in').length;
        return `<span class="pill" data-driver="${d}" onclick="filterDriver('${d}',this)">${d}: ${ci}/${cnt}</span>`;
      }).join('');
      container.innerHTML = allPill + driverPills;
    }

    function applyFilter() {
      const search = document.getElementById('search-input').value.toLowerCase();
      let rows = currentDriver === 'all' ? allRows : allRows.filter(r => r.driver === currentDriver);
      if (search) rows = rows.filter(r =>
        (r.order_number || '').toLowerCase().includes(search) ||
        (r.name || '').toLowerCase().includes(search) ||
        (r.phone || '').toLowerCase().includes(search));

      document.getElementById('stat-total').textContent = rows.length;
      document.getElementById('stat-checkedin').textContent = rows.filter(r => r.checkin_status === 'checked_in').length;
      document.getElementById('stat-pending').textContent = rows.filter(r => r.checkin_status !== 'checked_in').length;
      document.getElementById('records-count').textContent = `${rows.length} records`;

      const cols = getOrderedCols();
      const tbody = document.getElementById('track-tbody');
      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="${cols.length}" style="padding:28px;text-align:center;color:#4a6a8a;">No records found.</td></tr>`;
        return;
      }
      tbody.innerHTML = rows.map(r =>
        `<tr>${cols.map(c => renderCell(r, c.key)).join('')}</tr>`
      ).join('');
    }

    function emailStatusClass(s) {
      if (!s) return 'sp-pending';
      if (s.startsWith('sent')) return 'sp-sent';
      if (s.includes('failed')) return 'sp-failed';
      return 'sp-pending';
    }
    function emailLabel(s) {
      if (!s) return '—';
      if (s.startsWith('sent')) return 'Sent';
      if (s.includes('failed')) return 'Failed';
      return s;
    }
    function smsStatusClass(s) {
      if (!s) return 'sp-pending';
      if (s.includes('delivered')) return 'sp-delivered';
      if (s.includes('sent') || s.includes('queued')) return 'sp-sent';
      if (s.includes('undelivered') || s.includes('failed')) return 'sp-undelivered';
      return 'sp-pending';
    }
    function smsLabel(s) {
      if (!s) return '—';
      if (s.includes('delivered')) return 'Delivered';
      if (s.includes('sent') || s.includes('queued')) return 'Sent';
      if (s.includes('undelivered')) return 'Undelivered';
      if (s.includes('failed')) return 'Failed';
      return s;
    }
    function exportExcel() {
      location.href = `/api/notifications/morning-pickup/export?date=${currentDate}`;
    }

    // ── Init ──
    document.getElementById('date-display').value = currentDate;
    buildThead();
    loadData();
  </script>
</body>

</html>
