<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Your Account — NPE Operations</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,.10);
    padding: 48px 40px 40px;
    width: 100%;
    max-width: 420px;
  }
  .logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .logo-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #1a6b3c, #2ecc71);
    border-radius: 14px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 26px; margin-bottom: 12px;
  }
  .logo h1 { font-size: 20px; color: #1a1a2e; font-weight: 700; }
  .logo p  { font-size: 13px; color: #6b7280; margin-top: 4px; }

  .error-box {
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 8px;
    padding: 12px 14px;
    color: #dc2626;
    font-size: 13px;
    margin-bottom: 20px;
  }

  .form-group { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 6px;
  }
  input[type="text"], input[type="password"] {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 14px;
    color: #1a1a2e;
    background: #fafafa;
    transition: border-color .15s, box-shadow .15s;
    outline: none;
  }
  input:focus {
    border-color: #1a6b3c;
    box-shadow: 0 0 0 3px rgba(26,107,60,.12);
    background: #fff;
  }
  .hint {
    font-size: 11px;
    color: #9ca3af;
    margin-top: 4px;
  }

  .btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #1a6b3c, #27ae60);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .9; }

  .footer-note {
    text-align: center;
    font-size: 12px;
    color: #9ca3af;
    margin-top: 24px;
  }

  .strength-bar {
    height: 4px;
    border-radius: 2px;
    background: #e5e7eb;
    margin-top: 6px;
    overflow: hidden;
  }
  .strength-fill {
    height: 100%;
    width: 0%;
    border-radius: 2px;
    transition: width .3s, background .3s;
  }

  .initials-preview {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: #3b82f6;
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    margin-left: 10px;
    vertical-align: middle;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🏔️</div>
    <h1>NPE Operations</h1>
    <p>You've been invited to join as Staff</p>
  </div>

  {% if error %}
  <div class="error-box">⚠️ {{ error }}</div>
  {% endif %}

  <form method="post" action="/register/{{ token }}">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required
             autocomplete="username" placeholder="e.g. sarah_ops" minlength="3">
      <div class="hint">Minimum 3 characters, no spaces.</div>
    </div>

    <div class="form-group">
      <label for="initials">
        Initials
        <span class="initials-preview" id="initialsPreview">??</span>
      </label>
      <input type="text" id="initials" name="initials" required
             placeholder="e.g. SL" maxlength="4"
             oninput="updatePreview(this.value)"
             style="text-transform:uppercase;">
      <div class="hint">First & last name initials — e.g. Sarah Lee → SL</div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required
             autocomplete="new-password" placeholder="At least 8 characters" minlength="8"
             oninput="checkStrength(this.value)">
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    </div>

    <div class="form-group">
      <label for="confirm_password">Confirm Password</label>
      <input type="password" id="confirm_password" name="confirm_password" required
             autocomplete="new-password" placeholder="Repeat your password">
    </div>

    <button type="submit" class="btn">Create Account →</button>
  </form>

  <div class="footer-note">
    National Park Express · Operations Platform
  </div>
</div>

<script>
function updatePreview(val) {
  const clean = val.replace(/[^A-Za-z]/g, '').toUpperCase().slice(0, 4);
  document.getElementById('initialsPreview').textContent = clean || '??';
  document.getElementById('initials').value = clean;
}

function checkStrength(val) {
  const fill = document.getElementById('strengthFill');
  let score = 0;
  if (val.length >= 8)  score++;
  if (val.length >= 12) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const pct   = (score / 5) * 100;
  const color = score <= 2 ? '#ef4444' : score <= 3 ? '#f59e0b' : '#22c55e';
  fill.style.width = pct + '%';
  fill.style.background = color;
}
</script>
</body>
</html>
